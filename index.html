<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="minimum-scale=1, initial-scale=1, width=device-width, shrink-to-fit=no"
        />
        <meta name="theme-color" content="#2D2A32" media="(prefers-color-scheme: dark)" />
        <meta name="theme-color" content="#FAFDF6" media="(prefers-color-scheme: light)" />
        <link rel="manifest" href="./manifest.json" />
        <link rel="shortcut icon" href="./favicon.ico" />
        <title>hibento-admin</title>
        <style>
            html, body {
                margin: 0;
                padding: 0;
                height: 100%;
            }
            body {
                background-image: url("/background.webp") !important;
                background-size: cover !important;
                background-position: center !important;
                background-attachment: fixed !important;
                background-color: transparent !important;
            }
            .loader-container {
                display: flex;
                align-items: center;
                justify-content: center;
                position: absolute;
                top: 0;
                bottom: 0;
                left: 0;
                right: 0;
                background-color: transparent;
            }

            .spinner {
                width: 32px;
                height: 32px;
                border: 2px solid rgba(250, 253, 246, 0.2);
                border-top-color: #ddd92a;
                border-radius: 50%;
                animation: hibento-spin 0.8s linear infinite;
            }

            @keyframes hibento-spin {
                to { transform: rotate(360deg); }
            }
        </style>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Sora:wght@300;400;500;600;700&family=Geist:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
    </head>

    <body>
        <noscript> You need to enable JavaScript to run this app. </noscript>
        <div id="root">
            <div class="loader-container">
                <div class="spinner"></div>
            </div>
        </div>
    </body>
    <script type="module" src="/src/index.tsx"></script>
</html>
