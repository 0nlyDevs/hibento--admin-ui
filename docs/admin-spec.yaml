openapi: 3.0.3
info:
  title: HIBENTO Admin API
  description: |
    Admin-only endpoints for HIBENTO event management platform.
    All endpoints require authentication via OAuth2/OIDC (Casdoor).

    Authentication:
    - OAuth2 login via Casdoor (OIDC provider)
    - Admin access is granted based on email whitelist (hibento.admins config)
    - Users not in the admin whitelist receive a 403 Forbidden response
  version: 1.0.0

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Admin Events
    description: Create, update, and delete events
  - name: Admin Sessions
    description: Create, update, and delete sessions
  - name: Admin Speakers
    description: Create, update, and delete speakers
  - name: Admin Rooms
    description: Create, update, and delete rooms
  - name: Admin Venues
    description: Create, update, and delete venues

paths:
  # ==================== ADMIN EVENTS ====================
  /admin/events:
    post:
      tags:
        - Admin Events
      summary: Create a new event
      operationId: createEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEvent'
            example:
              title: "DevConf 2025"
              description: "The annual developer conference"
              online: false
              startDate: "2025-09-15T09:00:00Z"
              endDate: "2025-09-17T18:00:00Z"
              venueId: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
      responses:
        '201':
          description: Event created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
              example:
                id: "1a2b3c4d-1234-5678-9abc-def012345678"
                title: "DevConf 2025"
                description: "The annual developer conference"
                online: false
                startDate: "2025-09-15T09:00:00Z"
                endDate: "2025-09-17T18:00:00Z"
                venueId: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                createdAt: "2025-01-15T10:00:00Z"
                updatedAt: "2025-01-15T10:00:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/events/{eventId}:
    put:
      tags:
        - Admin Events
      summary: Update an event
      operationId: updateEvent
      parameters:
        - $ref: '#/components/parameters/EventId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEvent'
            example:
              title: "DevConf 2025 - Updated"
              description: "The annual developer conference (updated)"
              online: false
              startDate: "2025-09-15T09:00:00Z"
              endDate: "2025-09-17T18:00:00Z"
              venueId: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
      responses:
        '200':
          description: Event updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Admin Events
      summary: Delete an event
      operationId: deleteEvent
      parameters:
        - $ref: '#/components/parameters/EventId'
      responses:
        '204':
          description: Event deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==================== ADMIN SESSIONS ====================
  /admin/events/{eventId}/sessions:
    post:
      tags:
        - Admin Sessions
      summary: Create a session
      operationId: createSession
      parameters:
        - $ref: '#/components/parameters/EventId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSession'
            example:
              title: "Keynote: The Future of Web"
              description: "Opening keynote about web technologies"
              startTime: "2025-09-15T09:00:00Z"
              endTime: "2025-09-15T10:30:00Z"
              roomId: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
              capacity: 500
              speakerIds:
                - "1a2b3c4d-1234-5678-9abc-def012345678"
                - "2b3c4d5e-2345-6789-abcd-ef0123456789"
      responses:
        '201':
          description: Session created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
              example:
                id: "3c4d5e6f-3456-789a-bcde-f01234567890"
                eventId: "1a2b3c4d-1234-5678-9abc-def012345678"
                title: "Keynote: The Future of Web"
                description: "Opening keynote about web technologies"
                startTime: "2025-09-15T09:00:00Z"
                endTime: "2025-09-15T10:30:00Z"
                roomId: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                roomName: "Grand Hall"
                capacity: 500
                speakerIds:
                  - "1a2b3c4d-1234-5678-9abc-def012345678"
                  - "2b3c4d5e-2345-6789-abcd-ef0123456789"
                createdAt: "2025-01-15T10:00:00Z"
                updatedAt: "2025-01-15T10:00:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /admin/sessions/{sessionId}:
    put:
      tags:
        - Admin Sessions
      summary: Update a session
      operationId: updateSession
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSession'
            example:
              title: "Keynote: The Future of Web (Extended)"
              description: "Updated description"
              startTime: "2025-09-15T09:00:00Z"
              endTime: "2025-09-15T11:00:00Z"
              roomId: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
              capacity: 600
              speakerIds:
                - "1a2b3c4d-1234-5678-9abc-def012345678"
                - "2b3c4d5e-2345-6789-abcd-ef0123456789"
                - "3c4d5e6f-3456-789a-bcde-f01234567890"
      responses:
        '200':
          description: Session updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

    delete:
      tags:
        - Admin Sessions
      summary: Delete a session
      operationId: deleteSession
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '204':
          description: Session deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==================== ADMIN SPEAKERS ====================
  /admin/speakers:
    post:
      tags:
        - Admin Speakers
      summary: Create a speaker
      operationId: createSpeaker
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSpeaker'
            example:
              name: "Jane Doe"
              avatarUrl: "https://cdn.hibento.com/avatars/jane_doe.jpg"
              bio: "Tech lead at WebCorp with 10+ years of experience"
              externalLinks:
                - type: "github"
                  url: "https://github.com/janedoe"
                - type: "x"
                  url: "https://x.com/janedoe"
      responses:
        '201':
          description: Speaker created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpeakerResponse'
              example:
                id: "1a2b3c4d-1234-5678-9abc-def012345678"
                name: "Jane Doe"
                avatarUrl: "https://cdn.hibento.com/avatars/jane_doe.jpg"
                bio: "Tech lead at WebCorp with 10+ years of experience"
                externalLinks:
                  - type: "github"
                    url: "https://github.com/janedoe"
                  - type: "x"
                    url: "https://x.com/janedoe"
                createdAt: "2025-01-15T10:00:00Z"
                updatedAt: "2025-01-15T10:00:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/speakers/{speakerId}:
    put:
      tags:
        - Admin Speakers
      summary: Update a speaker
      operationId: updateSpeaker
      parameters:
        - $ref: '#/components/parameters/SpeakerId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSpeaker'
            example:
              name: "Jane Smith"
              avatarUrl: "https://cdn.hibento.com/avatars/jane_smith.jpg"
              bio: "Senior Tech lead at WebCorp"
              externalLinks:
                - type: "github"
                  url: "https://github.com/janesmith"
                - type: "linkedin"
                  url: "https://linkedin.com/in/janesmith"
      responses:
        '200':
          description: Speaker updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpeakerResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Admin Speakers
      summary: Delete a speaker
      operationId: deleteSpeaker
      parameters:
        - $ref: '#/components/parameters/SpeakerId'
      responses:
        '204':
          description: Speaker deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==================== ADMIN ROOMS ====================
  /admin/rooms:
    post:
      tags:
        - Admin Rooms
      summary: Create a room
      operationId: createRoom
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoom'
            example:
              name: "Workshop Studio"
              capacity: 50
              venueId: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
      responses:
        '201':
          description: Room created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponse'
              example:
                id: "4d5e6f7a-4567-89ab-cdef-012345678901"
                name: "Workshop Studio"
                capacity: 50
                venueId: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                createdAt: "2025-01-15T10:00:00Z"
                updatedAt: "2025-01-15T10:00:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /admin/rooms/{roomId}:
    put:
      tags:
        - Admin Rooms
      summary: Update a room
      operationId: updateRoom
      parameters:
        - $ref: '#/components/parameters/RoomId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoom'
            example:
              name: "Main Hall"
              capacity: 200
              venueId: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
      responses:
        '200':
          description: Room updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

    delete:
      tags:
        - Admin Rooms
      summary: Delete a room
      operationId: deleteRoom
      parameters:
        - $ref: '#/components/parameters/RoomId'
      responses:
        '204':
          description: Room deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ==================== ADMIN VENUES ====================
  /admin/venues:
    post:
      tags:
        - Admin Venues
      summary: Create a venue
      operationId: createVenue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVenue'
            example:
              name: "Anjanahary Convention Center"
              city: "Antananarivo"
              neighborhood: "Anjanahary"
              totalRooms: 10
      responses:
        '201':
          description: Venue created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VenueResponse'
              example:
                id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                name: "Anjanahary Convention Center"
                city: "Antananarivo"
                neighborhood: "Anjanahary"
                totalRooms: 10
                createdAt: "2025-01-15T10:00:00Z"
                updatedAt: "2025-01-15T10:00:00Z"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/venues/{venueId}:
    put:
      tags:
        - Admin Venues
      summary: Update a venue
      operationId: updateVenue
      parameters:
        - $ref: '#/components/parameters/VenueId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVenue'
            example:
              name: "Anjanahary Convention Center"
              city: "Antananarivo"
              neighborhood: "Anjanahary"
              totalRooms: 12
      responses:
        '200':
          description: Venue updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VenueResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Admin Venues
      summary: Delete a venue
      operationId: deleteVenue
      parameters:
        - $ref: '#/components/parameters/VenueId'
      responses:
        '204':
          description: Venue deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        implicit:
          authorizationUrl: http://localhost:8080/oauth2/authorization/casdoor
          scopes:
            openid: OpenID Connect
            profile: User profile
      description: |
        OAuth2 authentication via Casdoor (OIDC provider).
        Admin access is granted based on email whitelist.

  parameters:
    EventId:
      name: eventId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      example: "1a2b3c4d-1234-5678-9abc-def012345678"

    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      example: "3c4d5e6f-3456-789a-bcde-f01234567890"

    SpeakerId:
      name: speakerId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      example: "1a2b3c4d-1234-5678-9abc-def012345678"

    RoomId:
      name: roomId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      example: "4d5e6f7a-4567-89ab-cdef-012345678901"

    VenueId:
      name: venueId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      example: "3fa85f64-5717-4562-b3fc-2c963f66afa6"

  schemas:
    CreateEvent:
      type: object
      required:
        - title
        - startDate
        - endDate
      properties:
        title:
          type: string
          maxLength: 255
        description:
          type: string
        online:
          type: boolean
          default: false
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        venueId:
          type: string
          format: uuid

    UpdateEvent:
      type: object
      required:
        - title
        - startDate
        - endDate
      properties:
        title:
          type: string
          maxLength: 255
        description:
          type: string
        online:
          type: boolean
          default: false
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        venueId:
          type: string
          format: uuid

    EventResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        online:
          type: boolean
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        venueId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateSession:
      type: object
      required:
        - title
        - startTime
        - endTime
        - roomId
      properties:
        title:
          type: string
          maxLength: 255
        description:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        roomId:
          type: string
          format: uuid
        capacity:
          type: integer
          minimum: 0
        speakerIds:
          type: array
          items:
            type: string
            format: uuid

    UpdateSession:
      type: object
      required:
        - title
        - startTime
        - endTime
        - roomId
      properties:
        title:
          type: string
          maxLength: 255
        description:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        roomId:
          type: string
          format: uuid
        capacity:
          type: integer
          minimum: 0
        speakerIds:
          type: array
          items:
            type: string
            format: uuid

    SessionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        eventId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        roomId:
          type: string
          format: uuid
        roomName:
          type: string
        capacity:
          type: integer
        speakerIds:
          type: array
          items:
            type: string
            format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateSpeaker:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 255
        avatarUrl:
          type: string
          format: uri
        bio:
          type: string
        externalLinks:
          type: array
          items:
            $ref: '#/components/schemas/ExternalLinkInput'

    UpdateSpeaker:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 255
        avatarUrl:
          type: string
          format: uri
        bio:
          type: string
        externalLinks:
          type: array
          items:
            $ref: '#/components/schemas/ExternalLinkInput'

    ExternalLinkInput:
      type: object
      required:
        - type
        - url
      properties:
        type:
          type: string
          enum: [website, github, x, linkedin, facebook, instagram, other]
        url:
          type: string
          format: uri

    ExternalLink:
      type: object
      properties:
        type:
          type: string
        url:
          type: string

    SpeakerResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        avatarUrl:
          type: string
          format: uri
          nullable: true
        bio:
          type: string
        externalLinks:
          type: array
          items:
            $ref: '#/components/schemas/ExternalLink'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateRoom:
      type: object
      required:
        - name
        - venueId
      properties:
        name:
          type: string
          maxLength: 100
        capacity:
          type: integer
          minimum: 1
        venueId:
          type: string
          format: uuid

    UpdateRoom:
      type: object
      required:
        - name
        - venueId
      properties:
        name:
          type: string
          maxLength: 100
        capacity:
          type: integer
          minimum: 1
        venueId:
          type: string
          format: uuid

    RoomResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        capacity:
          type: integer
        venueId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateVenue:
      type: object
      required:
        - name
        - city
        - neighborhood
        - totalRooms
      properties:
        name:
          type: string
          maxLength: 255
        city:
          type: string
          maxLength: 255
        neighborhood:
          type: string
          maxLength: 255
        totalRooms:
          type: integer
          minimum: 1

    UpdateVenue:
      type: object
      required:
        - name
        - city
        - neighborhood
        - totalRooms
      properties:
        name:
          type: string
          maxLength: 255
        city:
          type: string
          maxLength: 255
        neighborhood:
          type: string
          maxLength: 255
        totalRooms:
          type: integer
          minimum: 1

    VenueResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        city:
          type: string
        neighborhood:
          type: string
        totalRooms:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        error:
          type: string
      example:
        error: "Event not found"

  responses:
    BadRequest:
      description: Invalid request parameters or body
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "Start date must be before end date"

    Unauthorized:
      description: Not authenticated. Please authenticate via OAuth2.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "Unauthorized"

    Forbidden:
      description: Authenticated but not authorized as admin.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "Forbidden"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "Event not found"

    Conflict:
      description: Resource conflict (e.g., time overlap, duplicate name)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "Room already has a session during this time"
